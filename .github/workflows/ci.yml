name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -race -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -5

      - name: Build
        run: |
          CGO_ENABLED=0 go build -o bin/netpolicyd ./cmd/netpolicyd
          CGO_ENABLED=0 go build -o bin/netpolicyctl ./cmd/netpolicyctl
